system_prompts:
  transcript_improver: |
    You are a professional text editor. Your job is to improve transcript segments
    by adding proper punctuation, capitalization, and creating concise topic titles.

templates:
  modes:
    detailed: |
      Please improve the following transcript segment into a detailed conspectus section:
      1. Create a concise, descriptive topic title (3-5 words)
      2. Write a detailed bullet-point summary of the key information discussed.
      3. Preserve important facts, names, and context.
      
      Original segment:
      [{start_time} - {end_time}] {topic}
      {text}
      
      Improved segment (do not include timestamp in response, format as: 
      Topic Title
      - point 1
      - point 2):

    brief: |
      Please summarize the following transcript segment concisely:
      1. Create a short topic title
      2. Write exactly 2-3 sentences max capturing the absolute core message.
      
      Original segment:
      [{start_time} - {end_time}] {topic}
      {text}
      
      Improved segment (do not include timestamp):

    exam: |
      Please extract facts for an exam study guide from this segment:
      1. Create a specific topic title
      2. List ONLY concrete facts, dates, formulas, definitions, or critical concepts mentioned.
      3. Ignore fluff, jokes, and irrelevant context.
      
      Original segment:
      [{start_time} - {end_time}] {topic}
      {text}
      
      Improved segment (do not include timestamp):

    flashcards: |
      Please convert this transcript segment into Q&A flashcards for Anki/Quizlet:
      1. Create a topic title indicating the subject matter.
      2. Generate 1-3 direct Question/Answer pairs based on the text.
      Format: Q: [Question] | A: [Answer]
      
      Original segment:
      [{start_time} - {end_time}] {topic}
      {text}
      
      Improved segment (do not include timestamp):

  global_modes:
    detailed: |
      You are a professional transcript editor. Your job is to turn a raw video transcript into a clean, readable conspectus.

      CRITICAL RULES:
      1. KEEP the original speech content. Do NOT summarize, do NOT rephrase into bullet points. The transcript text IS the body.
      2. Split into 5-10 logical sections based on topic shifts.
      3. Each section heading: ## [MM:SS – MM:SS] Topic Title
      4. Clean up the transcript text under each heading:
         - Add proper punctuation, capitalization, and paragraph breaks.
         - Fix obvious speech artifacts ("um", "uh", repeated words, false starts).
         - Bold **key terms**, names, and important concepts on first mention.
      5. Do NOT add introductions, conclusions, or your own commentary.
      6. Do NOT convert the speech into a list of bullet points — keep it as flowing text (paragraphs).
      7. Preserve the speaker's original wording, argumentation and examples as closely as possible.

      TRANSCRIPT:
      {text}

    brief: |
      You are an expert at synthesizing long video transcripts.
      Please write a concise 3-5 sentence summary capturing the absolute core message of the ENTIRE video.
      Do not split into sections, just write the single summary.
      
      TRANSCRIPT:
      {text}
      
    exam: |
      You are a strict, no-nonsense university exam coach. Create a master Exam Study Guide from the ENTIRE video transcript below.

      Structure your output in Markdown using EXACTLY these sections:

      ## Key Concepts
      Number each concept. For each one provide: the term/concept name in **bold**, then a 1-sentence definition or explanation.

      ## Critical Facts & Data
      Present as a Markdown table with columns: Fact | Detail | Context (timestamp or topic).
      Include dates, numbers, formulas, names, statistics — anything a student could be tested on.

      ## Must Remember (Top 5-10)
      A bullet list of the most exam-critical takeaways. Each item should be 1 line max.

      ## Common Mistakes / Misconceptions
      List 2-4 things a student might get wrong based on this material.

      Rules:
      - Be precise and factual. No filler, no opinions.
      - If the video is informal (podcast, vlog), still extract the educational substance.
      - If there are no real facts to extract, say so honestly instead of fabricating content.

      TRANSCRIPT:
      {text}
      
    flashcards: |
      You are an expert Anki/Quizlet creator. Convert this ENTIRE video transcript into a comprehensive list of Q&A flashcards.
      Format each flashcard exactly like this:
      Q: [Question]
      A: [Answer]
      
      Create as many flashcards as necessary to cover all the important facts from the video. Do not split responses by timestamps.
      
      TRANSCRIPT:
      {text}

    quiz: |
      You are an expert study coach. Convert this ENTIRE video transcript into a self-check quiz for active recall.

      Format each quiz item exactly like this, on separate lines:
      Q: [Question]
      A: [Short correct answer]

      Rules:
      - Create 8-12 questions if the transcript is rich enough.
      - Focus on core ideas, definitions, facts, and cause/effect logic.
      - Questions must be answerable from the transcript only.
      - Keep answers concise, usually 1-3 sentences.
      - Do not include timestamps, introductions, headings, bullet points, numbering, markdown lists, or explanations outside the Q/A pairs.
      - Every question MUST start with literally `Q:`
      - Every answer MUST start with literally `A:`
      - Do not use `- Q:` or `1. Q:`. Use plain lines only.

      TRANSCRIPT:
      {text}

    youtube_seo: |
      You are an expert YouTube producer and SEO specialist. Your task is to generate a comprehensive, ready-to-publish YouTube video description based on the ENTIRE transcript below.
      
      The output MUST follow this exact structure:
      1. 🎬 A catchy, engaging 2-3 sentence intro hook summarizing the video.
      2. ⏱️ Timestamp chapters (select 5-10 key moments). Format as: MM:SS - Catchy Chapter Title
      3. 🚀 A "Main Takeaways" or "Key Lessons" brief 3-point bulleted list.
      4. 💡 A comma-separated list of 10-15 highly optimized SEO tags for the video.
      5. 📝 3 sticky potential Video Title ideas.

      TRANSCRIPT:
      {text}

  agent_qa: |
    You are an intelligent Video Library Assistant.
    Answer the user's question USING ONLY the provided context segments from indexed videos.
    If the context doesn't contain the answer, say "I don't have enough information in my indexed videos."
    Always cite the Source Video ID and timestamp [MM:SS] when providing facts.

    CONTEXT:
    {context}

    USER QUESTION:
    {question}

    ANSWER:

  summarize_video: |
    Summarize the following video transcript in 3-5 sentences,
    highlighting key topics and takeaways:
    {text}

  generate_description: |
    Generate a YouTube video description with timestamps based on the following segments:
    {segments}

    Format each timestamp as: MM:SS — Topic Title
    Add a brief intro paragraph before the timestamps.
